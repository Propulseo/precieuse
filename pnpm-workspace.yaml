overrides:
  shell-quote: '^1.8.4'
  ws: '^8.21.0'
  undici: '^7.28.0'
  launch-editor: '^2.14.1'
  vite: '^8.0.16'
  js-yaml@3: '^3.15.0'
  js-yaml@4: '^4.1.2'
  uuid@8: '^11.1.1'
  uuid@10: '^11.1.1'
