<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Témoignages — Relief</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Ysabeau+Office:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
<style>
  :root{--canard:#125e5e;--canard-90:#0d4747;--poudre:#eadcd3;--poudre-dark:#d9c7b8;--rubis:#b80049;
    --display:'Spectral',Georgia,serif;--body:'Ysabeau Office',system-ui,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--body);background:
      radial-gradient(120% 120% at 50% 0%, #f1e6db 0%, var(--poudre) 45%, var(--poudre-dark) 130%);
    color:var(--canard);overflow:hidden;display:grid;place-items:center}

  .wrap{text-align:center;width:min(680px,90vw)}
  .eyebrow{font-family:var(--display);font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--rubis);margin-bottom:10px}
  h2{font-family:var(--display);font-weight:500;font-size:clamp(26px,3.6vw,42px);color:var(--canard);margin-bottom:46px;letter-spacing:-.01em}
  .hint{position:fixed;top:30px;left:0;right:0;text-align:center;font-family:var(--display);font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:rgba(18,94,94,.45)}

  .deck{position:relative;height:360px;perspective:1300px;margin-bottom:40px}
  .c{position:absolute;inset:0;margin:auto;width:min(560px,86vw);height:330px;border-radius:30px;
    background:linear-gradient(165deg,#16706e,var(--canard) 55%,var(--canard-90));color:var(--poudre);
    padding:48px 46px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
    box-shadow:0 30px 60px -28px rgba(13,71,71,.65), inset 0 1px 0 rgba(255,255,255,.08);
    transform-style:preserve-3d;transition:transform .8s cubic-bezier(.2,.7,.2,1), opacity .8s ease;will-change:transform;backface-visibility:hidden}
  .c .sheen{position:absolute;inset:0;border-radius:30px;pointer-events:none;
    background:radial-gradient(60% 60% at var(--mx,30%) var(--my,20%), rgba(255,255,255,.18), rgba(255,255,255,0) 55%)}
  .c .quo{font-family:var(--display);font-size:60px;line-height:.2;color:var(--rubis);filter:brightness(1.5) saturate(1.3);margin-bottom:18px}
  .c blockquote{font-family:var(--display);font-weight:500;font-size:clamp(18px,2vw,25px);line-height:1.45;max-width:34ch}
  .c .who{margin-top:26px;font-family:var(--display);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:rgba(234,220,211,.85)}
  .c .who .p{display:block;margin-top:6px;font-family:var(--body);font-style:italic;font-size:14px;letter-spacing:0;text-transform:none;color:rgba(234,220,211,.55)}

  /* Profondeur de la pile (cartes derrière) */
  .c[data-pos="1"]{transform:translateY(26px) scale(.93);opacity:.55;filter:saturate(.85)}
  .c[data-pos="2"]{transform:translateY(48px) scale(.86);opacity:.28}
  .c[data-pos="0"]{z-index:3}.c[data-pos="1"]{z-index:2}.c[data-pos="2"]{z-index:1}
  .c.fly{transform:translateY(-40px) translateX(8%) rotate(4deg) scale(.9);opacity:0}

  .controls{display:flex;gap:14px;justify-content:center;align-items:center}
  .controls button{font-family:var(--display);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    border:1px solid rgba(18,94,94,.35);background:transparent;color:var(--canard);padding:13px 26px;border-radius:999px;cursor:pointer;transition:all .3s}
  .controls button:hover{background:var(--canard);color:var(--poudre);border-color:var(--canard)}
  .controls .dots{display:flex;gap:8px;margin-left:6px}
  .controls .dots i{width:8px;height:8px;border-radius:99px;background:rgba(18,94,94,.25);transition:all .3s}
  .controls .dots i.on{background:var(--rubis);width:24px}
  @media (prefers-reduced-motion:reduce){.c{transition:opacity .3s}}
</style>
</head>
<body>
  <p class="hint">Précieuse — Aperçu 3 · Relief</p>
  <div class="wrap">
    <p class="eyebrow">Elles en parlent</p>
    <h2>Ce qu'elles en disent</h2>
    <div class="deck" id="deck"></div>
    <div class="controls">
      <button id="next">Témoignage suivant</button>
      <span class="dots" id="dots"></span>
    </div>
  </div>

<script>
  const data=[
    {q:"Emeline est tout simplement une artiste. Le résultat est au-delà de ce que j'avais imaginé.", a:"Martine B.", v:"Bordeaux", p:"Création sur-mesure"},
    {q:"Très professionnelle, agréable et sympathique. Je recommande sans hésiter.", a:"Sandrine L.", v:"Lyon", p:"Bague serpentine"},
    {q:"On sent dans chaque pièce le temps passé, la précision, l'amour du métier.", a:"Camille R.", v:"Paris", p:"Modèle Joséphine"},
  ];
  const deck=document.getElementById('deck'), dots=document.getElementById('dots');
  let order=data.map((_,k)=>k), busy=false;

  const cards=data.map(d=>{
    const c=document.createElement('article'); c.className='c';
    c.innerHTML=`<div class="sheen"></div><div class="quo">«</div>
      <blockquote>${d.q}</blockquote>
      <div class="who">${d.a} · ${d.v}<span class="p">${d.p}</span></div>`;
    deck.appendChild(c); return c;
  });
  data.forEach(()=>{const i=document.createElement('i');dots.appendChild(i);});
  const dotEls=[...dots.children];

  function layout(){
    order.forEach((cardIdx,pos)=>{ cards[cardIdx].dataset.pos = Math.min(pos,2); cards[cardIdx].style.display = pos>2?'none':'flex'; });
    dotEls.forEach((d,k)=>d.classList.toggle('on',k===order[0]));
  }
  function next(){
    if(busy)return; busy=true;
    const top=cards[order[0]]; top.classList.add('fly');
    setTimeout(()=>{ top.classList.remove('fly'); order.push(order.shift()); layout(); busy=false; }, 650);
  }
  document.getElementById('next').onclick=next;

  // Inclinaison 3D de la carte du dessus + reflet qui suit la souris
  deck.addEventListener('mousemove',e=>{
    const top=cards[order[0]]; const r=top.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;
    top.style.transform=`rotateY(${(x-.5)*10}deg) rotateX(${(.5-y)*10}deg)`;
    top.style.setProperty('--mx',(x*100)+'%'); top.style.setProperty('--my',(y*100)+'%');
  });
  deck.addEventListener('mouseleave',()=>{ const top=cards[order[0]]; top.style.transform=''; });
  let auto=setInterval(next,7000);
  deck.addEventListener('mouseenter',()=>clearInterval(auto));
  deck.addEventListener('mouseleave',()=>auto=setInterval(next,7000));
  layout();
</script>
</body>
</html>
